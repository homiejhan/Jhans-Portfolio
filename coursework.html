<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coursework — Justin Han</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <header>
    <a class="logo" href="index.html">Justin Han</a>
    <nav>
      <a href="index.html">About Me</a>
      <a href="coursework.html" class="active">Coursework</a>
    </nav>
  </header>

  <main class="page-wrap page-wrap--wide" style="padding-top:5rem; padding-bottom:6rem;">
    <p class="page-eyebrow">— Coursework</p>
    <h1>Classes &amp;<br><em>Learning.</em></h1>
    <p class="subtitle">All of my coursework, organized by semester. Click any course to see key topics, takeaways, and projects built along the way.</p>

    <div class="controls-row">
      <div class="sort-bar">
        <button class="sort-btn active" data-mode="chron-asc">Chronological ↑</button>
        <button class="sort-btn" data-mode="chron-desc">Chronological ↓</button>
        <button class="sort-btn" data-mode="subject">Subject</button>
        <button class="sort-btn" data-mode="relevance">Relevance</button>
      </div>
      <label class="alpha-label">
        <input type="checkbox" id="alpha-toggle" />
        Alphabetical within sections
      </label>
    </div>

    <div id="course-container"></div>
  </main>

  <footer>
    <span>Justin Han · Portfolio</span>
    <span id="yr"></span>
  </footer>

  <script src="assets/js/courses.js"></script>
  <script src="assets/js/coursework.js"></script>
  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
