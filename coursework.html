<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coursework — Justin Han</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cream: #F5F0E8; --ink: #1A1A18; --rust: #C0521F; --sand: #D9C9A8; --muted: #7A7368; }
    html, body { background: var(--cream); color: var(--ink); font-family: 'DM Mono', monospace; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.5;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 2rem 3rem; border-bottom: 1px solid var(--sand);
      position: sticky; top: 0; background: var(--cream); z-index: 100;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); text-decoration: none; }
    nav { display: flex; border: 1px solid var(--sand); }
    nav a {
      text-decoration: none; font-family: 'DM Mono', monospace; font-size: 0.72rem;
      font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); padding: 0.65rem 1.4rem; border-right: 1px solid var(--sand);
      transition: background 0.2s, color 0.2s;
    }
    nav a:last-child { border-right: none; }
    nav a:hover, nav a.active { background: var(--ink); color: var(--cream); }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 5rem 3rem 6rem; }
    .page-eyebrow { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--rust); margin-bottom: 1rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.1; letter-spacing: -0.03em; margin-bottom: 0.75rem; }
    h1 em { font-style: italic; color: var(--rust); }
    .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 2.5rem; line-height: 1.7; }

    /* SORT CONTROLS */
    .sort-bar {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--sand);
      margin-bottom: 3.5rem;
      width: fit-content;
    }
    .sort-btn {
      font-family: 'DM Mono', monospace; font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); background: var(--cream);
      border: none; border-right: 1px solid var(--sand);
      padding: 0.65rem 1.3rem; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .sort-btn:last-child { border-right: none; }
    .sort-btn:hover { background: #EDE8DF; color: var(--ink); }
    .sort-btn.active { background: var(--ink); color: var(--cream); }

    /* ALPHA TOGGLE */
    .controls-row { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 3.5rem; flex-wrap: wrap; }
    .sort-bar { margin-bottom: 0; }
    .alpha-label {
      display: flex; align-items: center; gap: 0.55rem;
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    .alpha-label input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 14px; height: 14px;
      border: 1px solid var(--sand); background: var(--cream);
      cursor: pointer; position: relative; flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .alpha-label input[type="checkbox"]:checked { background: var(--ink); border-color: var(--ink); }
    .alpha-label input[type="checkbox"]:checked::after {
      content: ''; position: absolute;
      left: 3px; top: 1px; width: 5px; height: 8px;
      border: 1.5px solid var(--cream); border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    /* SECTION BLOCK */
    .section-block { margin-bottom: 4rem; animation: fadeUp 0.4s ease both; }
    .section-header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.25rem; }
    .section-label { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--ink); white-space: nowrap; }
    .section-divider { flex: 1; height: 1px; background: var(--sand); }
    .section-count { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }

    /* COURSE GRID */
    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1px; background: var(--sand); border: 1px solid var(--sand); }
    .course-card { background: var(--cream); padding: 1.75rem; display: flex; flex-direction: column; gap: 0.75rem; cursor: pointer; color: inherit; text-decoration: none; transition: background 0.18s; }
    .card-footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.25rem; }
    .card-arrow { font-size: 0.85rem; color: var(--rust); opacity: 0; transition: opacity 0.2s, transform 0.2s; flex-shrink: 0; }
    .course-card:hover { background: #EDE8DF; }
    .course-card:hover .card-arrow { opacity: 1; transform: translate(2px, -2px); }
    .card-meta { display: flex; justify-content: space-between; align-items: center; }
    .card-code { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rust); }
    .card-semester { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.05em; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; line-height: 1.25; color: var(--ink); }
    .card-desc { font-size: 0.78rem; line-height: 1.75; color: var(--muted); flex: 1; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.25rem; }
    .tag { font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.2rem 0.55rem; border: 1px solid var(--sand); color: var(--muted); }

    footer { padding: 1.5rem 3rem; border-top: 1px solid var(--sand); display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.05em; margin-top: 2rem; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) {
      header { padding: 1.25rem; flex-wrap: wrap; gap: 1rem; }
      .page-wrap { padding: 3rem 1.25rem 4rem; }
      nav a { padding: 0.55rem 0.9rem; font-size: 0.65rem; }
      .sort-bar { flex-wrap: wrap; }
      .sort-btn { border-right: 1px solid var(--sand); border-bottom: 1px solid var(--sand); }
      footer { flex-direction: column; gap: 0.5rem; padding: 1.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="index.html">Justin Han</a>
    <nav>
      <a href="index.html">About Me</a>
      <a href="coursework.html" class="active">Coursework</a>
    </nav>
  </header>

  <main class="page-wrap">
    <p class="page-eyebrow">— Coursework</p>
    <h1>Classes &<br><em>Learning.</em></h1>
    <p class="subtitle">All of my coursework, organized by semester. Click any course to see key topics, takeaways, and projects built along the way.</p>

    <div class="controls-row">
      <div class="sort-bar">
        <button class="sort-btn active" data-mode="chron-asc">Chronological ↑</button>
        <button class="sort-btn" data-mode="chron-desc">Chronological ↓</button>
        <button class="sort-btn" data-mode="subject">Subject</button>
        <button class="sort-btn" data-mode="relevance">Relevance</button>
      </div>
      <label class="alpha-label">
        <input type="checkbox" id="alpha-toggle" />
        Alphabetical within sections
      </label>
    </div>

    <div id="course-container"></div>
  </main>

  <footer>
    <span>Justin Han · Portfolio</span>
    <span id="yr"></span>
  </footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// ─── COURSE DATA ────────────────────────────────────────────────────────────
const courses = [
  // FALL 2023
  { slug:'ece-302',         code:'ECE 302', title:'Intro to Electrical Engineering',          semester:'Fall 2023',   semOrder:1,  desc:'Foundational concepts in circuits, signals, and electrical systems.',                                              tags:['Circuits','Signals'] },
  { slug:'ece-306',         code:'ECE 306', title:'Intro to Computer Engineering',            semester:'Fall 2023',   semOrder:1,  desc:'Digital logic, binary systems, and the hardware-software interface.',                                            tags:['Digital Logic','Hardware'] },
  { slug:'m-408d',          code:'M 408D',  title:'Sequences, Series, and Multivariable Calculus', semester:'Fall 2023', semOrder:1, desc:'Convergence of sequences and series, power series, and calculus of several variables.',                      tags:['Calculus','Series','Multivariable'] },
  { slug:'ugs-303',         code:'UGS 303', title:'Indigenous Latin America Today',           semester:'Fall 2023',   semOrder:1,  desc:'Contemporary issues facing Indigenous communities across Latin America — politics, culture, and identity.',      tags:['History','Culture','Politics'] },
  // SPRING 2024
  { slug:'ece-319h',        code:'ECE 319H',title:'Intro to Embedded Systems (Honors)',       semester:'Spring 2024', semOrder:2,  desc:'Microcontroller programming, I/O interfacing, and real-time embedded system design.',                           tags:['C','Microcontrollers','Embedded'] },
  { slug:'ece-312h',        code:'ECE 312H',title:'Software Design & Implementation I (Honors)', semester:'Spring 2024', semOrder:2, desc:'Object-oriented design, data abstraction, and software engineering principles.',                            tags:['C++','OOP','Software Design'] },
  { slug:'m-427j-spring2024', code:'M 427J',  title:'Differential Equations with Linear Algebra', semester:'Spring 2024', semOrder:2, desc:'ODEs, systems of equations, eigenvalue methods, and applications to engineering problems.',                   tags:['ODEs','Linear Algebra'] },
  { slug:'ant-305',         code:'ANT 305', title:'Expressive Culture',                        semester:'Spring 2024', semOrder:2,  desc:'Anthropological study of art, ritual, music, and performance as expressions of cultural meaning.',            tags:['Anthropology','Culture','Art'] },
  // FALL 2024
  { slug:'ece-411',         code:'ECE 411', title:'Circuit Theory',                            semester:'Fall 2024',   semOrder:3,  desc:'Advanced analysis of linear circuits, network theorems, and frequency-domain techniques.',                    tags:['Circuits','AC/DC','Laplace'] },
  { slug:'ece-351k',        code:'ECE 351K',title:'Probability and Random Processes',          semester:'Fall 2024',   semOrder:3,  desc:'Probability theory, random variables, stochastic processes, and their engineering applications.',             tags:['Probability','Statistics','Stochastic'] },
  { slug:'m-325k',          code:'M 325K',  title:'Discrete Mathematics',                      semester:'Fall 2024',   semOrder:3,  desc:'Logic, set theory, combinatorics, graph theory, and proof techniques.',                                       tags:['Logic','Combinatorics','Proofs'] },
  { slug:'m-340l',          code:'M 340L',  title:'Matrices and Matrix Calculations',          semester:'Fall 2024',   semOrder:3,  desc:'Matrix operations, linear systems, eigenvalues, and computational methods.',                                  tags:['Matrices','Linear Algebra'] },
  { slug:'acc-310f',        code:'ACC 310F',title:'Foundations of Accounting',                 semester:'Fall 2024',   semOrder:3,  desc:'Financial statements, the accounting cycle, and fundamental principles of managerial accounting.',            tags:['Accounting','Finance'] },
  { slug:'es-260-fall2024',  code:'E S 260', title:'Service Learning for Engineers',            semester:'Fall 2024',   semOrder:3,  desc:'Applying engineering skills to community-based challenges through structured service learning.',              tags:['Service','Community','Ethics'] },
  // SPRING 2025
  { slug:'ece-316',         code:'ECE 316', title:'Digital Logic Design',                      semester:'Spring 2025', semOrder:4,  desc:'Boolean algebra, combinational and sequential circuits, and hardware description languages.',                  tags:['Digital Logic','VHDL','FPGAs'] },
  { slug:'ece-333t',        code:'ECE 333T',title:'Engineering Communication',                 semester:'Spring 2025', semOrder:4,  desc:'Technical writing, presentations, and professional communication strategies for engineers.',                   tags:['Writing','Presentations'] },
  { slug:'mkt-320f',        code:'MKT 320F',title:'Foundations of Marketing',                  semester:'Spring 2025', semOrder:4,  desc:'Core marketing concepts — consumer behavior, market research, branding, and strategy.',                       tags:['Marketing','Strategy','Branding'] },
  { slug:'es-260-spring2025', code:'E S 260', title:'Service Learning for Engineers',            semester:'Spring 2025', semOrder:4,  desc:'Continued application of engineering skills to real-world community service projects.',                        tags:['Service','Community','Ethics'] },
  // SUMMER 2025
  { slug:'ece-422c',        code:'ECE 422C',title:'Software Design & Implementation II',       semester:'Summer 2025', semOrder:5,  desc:'Advanced software engineering — concurrency, design patterns, and large-scale system design.',                tags:['Java','Concurrency','Design Patterns'] },
  { slug:'ece-360c',        code:'ECE 360C',title:'Algorithms',                                semester:'Summer 2025', semOrder:5,  desc:'Algorithm design and analysis — sorting, graphs, dynamic programming, and complexity theory.',                tags:['Algorithms','Complexity','Graph Theory'] },
  { slug:'mis-302f',        code:'MIS 302F',title:'Foundations of Info Tech Management',       semester:'Summer 2025', semOrder:5,  desc:'IT strategy, systems management, and the role of technology in modern organizations.',                        tags:['IT Management','Strategy'] },
  { slug:'rs-353e',         code:'R S 353E',title:'Beyond the New Testament',                  semester:'Summer 2025', semOrder:5,  desc:'Early Christian texts outside the canonical Bible — apocrypha, gnostic gospels, and church history.',         tags:['Religion','History','Texts'] },
  { slug:'ped-106c',        code:'PED 106C',title:'Beginners Pickleball',                      semester:'Summer 2025', semOrder:5,  desc:'Introduction to pickleball — rules, technique, strategy, and recreational play.',                             tags:['Sports','Wellness'] },
  // FALL 2025
  { slug:'ece-460n',        code:'ECE 460N',title:'Computer Architecture',                     semester:'Fall 2025',   semOrder:6,  desc:'Processor design, instruction set architectures, pipelining, memory hierarchy, and performance.',             tags:['Architecture','Assembly','Pipelining'] },
  { slug:'ece-313',         code:'ECE 313', title:'Linear Systems and Signals',                semester:'Fall 2025',   semOrder:6,  desc:'Continuous and discrete-time signals, LTI systems, Fourier analysis, and the Z-transform.',                  tags:['Signals','Fourier','LTI Systems'] },
  { slug:'m-427j-fall2025',  code:'M 427J',  title:'Advanced Calculus for Applications',        semester:'Fall 2025',   semOrder:6,  desc:'Vector calculus — gradients, line and surface integrals, Green\'s, Stokes\', and divergence theorems.',       tags:['Vector Calc','Multivariable'] },
  { slug:'leb-320f',        code:'LEB 320F',title:'Foundations of Business Law and Ethics',    semester:'Fall 2025',   semOrder:6,  desc:'Legal frameworks, contracts, liability, and ethical decision-making in business contexts.',                  tags:['Law','Ethics','Business'] },
  { slug:'la-321',          code:'L A 321', title:'International Internship',                  semester:'Fall 2025',   semOrder:6,  desc:'Applied data analytics and database management in an international professional setting.',                    tags:['Data Analytics','Databases','Internship'] },
  // SPRING 2026
  { slug:'ece-445l',        code:'ECE 445L',title:'Embedded Systems Design Laboratory',        semester:'Spring 2026', semOrder:7,  desc:'End-to-end embedded system design — hardware, firmware, and integration through lab projects.',               tags:['Embedded','Hardware','Lab'] },
  { slug:'ece-445s',        code:'ECE 445S',title:'Real-Time DSP Laboratory',                  semester:'Spring 2026', semOrder:7,  desc:'Real-time digital signal processing — filter design, audio processing, and DSP implementation.',              tags:['DSP','Real-Time','Lab'] },
  { slug:'ece-351m',        code:'ECE 351M',title:'Digital Signal Processing',                 semester:'Spring 2026', semOrder:7,  desc:'DFT, FFT, FIR/IIR filter design, sampling theory, and spectral analysis.',                                   tags:['DSP','FFT','Filters'] },
  { slug:'fin-320f',        code:'FIN 320F',title:'Foundations of Finance',                    semester:'Spring 2026', semOrder:7,  desc:'Time value of money, risk and return, capital markets, and corporate financial decision-making.',             tags:['Finance','Investing','Markets'] },
];

// ─── CLASSIFICATION HELPERS ──────────────────────────────────────────────────
const BUSINESS_CODES = new Set(['ACC 310F','MIS 302F','MKT 320F','LEB 320F','FIN 320F']);

function subjectGroup(c) {
  const prefix = c.code.split(' ')[0];
  if (prefix === 'ECE') return 'Major Related Courses';
  if (prefix === 'M')   return 'Mathematics Courses';
  if (BUSINESS_CODES.has(c.code)) return 'Business Minor Courses';
  return 'Other Courses';
}

const SUBJECT_ORDER = ['Major Related Courses','Mathematics Courses','Business Minor Courses','Other Courses'];

// Relevance buckets — code used as key
const RELEVANCE_MAP = {
  'ECE 460N':'Architecture/Systems Related Core Courses',
  'ECE 445L':'Architecture/Systems Related Core Courses',
  'ECE 360C':'Architecture/Systems Related Core Courses',
  'ECE 316': 'Architecture/Systems Related Core Courses',
  'M 325K':  'Architecture/Systems Related Core Courses',

  'ECE 422C':'Architecture/Systems Related Electives',
  'ECE 445S':'Architecture/Systems Related Electives',
  'ECE 351M':'Architecture/Systems Related Electives',

  'ECE 302': 'Introductory / Required Lower Division Courses',
  'ECE 306': 'Introductory / Required Lower Division Courses',
  'ECE 319H':'Introductory / Required Lower Division Courses',
  'ECE 312H':'Introductory / Required Lower Division Courses',
  'ECE 411': 'Introductory / Required Lower Division Courses',
  'ECE 313': 'Introductory / Required Lower Division Courses',
  'M 408D':  'Introductory / Required Lower Division Courses',

  'ECE 351K':'Required Upper Division Courses',
  'ECE 333T':'Required Upper Division Courses',
  'M 340L':  'Required Upper Division Courses',
};

// M 427J appears twice — handled specially below
function relevanceGroup(c) {
  if (BUSINESS_CODES.has(c.code)) return 'Business Minor Courses';
  if (RELEVANCE_MAP[c.code]) return RELEVANCE_MAP[c.code];
  // M 427J Spring 2024 = Required Upper Division; Fall 2025 = Architecture/Systems Related Electives
  if (c.code === 'M 427J') {
    return c.semOrder === 2
      ? 'Required Upper Division Courses'
      : 'Architecture/Systems Related Electives';
  }
  return 'Other Courses';
}

const RELEVANCE_ORDER = [
  'Architecture/Systems Related Core Courses',
  'Architecture/Systems Related Electives',
  'Introductory / Required Lower Division Courses',
  'Required Upper Division Courses',
  'Business Minor Courses',
  'Other Courses',
];

// ─── RENDER ──────────────────────────────────────────────────────────────────
function cardHTML(c, showSemester) {
  const semTag = showSemester ? `<span class="card-semester">${c.semester}</span>` : '';
  return `
    <a class="course-card" href="courses/${c.slug}.html">
      <div class="card-meta"><span class="card-code">${c.code}</span>${semTag}</div>
      <div class="card-title">${c.title}</div>
      <p class="card-desc">${c.desc}</p>
      <div class="card-footer-row">
        <div class="card-tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <span class="card-arrow">↗</span>
      </div>
    </a>`;
}

function sectionHTML(label, cards, showSemester) {
  return `
    <div class="section-block">
      <div class="section-header">
        <span class="section-label">${label}</span>
        <div class="section-divider"></div>
        <span class="section-count">${cards.length} course${cards.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="course-grid">${cards.map(c => cardHTML(c, showSemester)).join('')}</div>
    </div>`;
}

function groupBy(arr, keyFn, orderArr) {
  const map = {};
  arr.forEach(c => {
    const k = keyFn(c);
    if (!map[k]) map[k] = [];
    map[k].push(c);
  });
  return orderArr.filter(k => map[k]);
}

function render(mode) {
  const alpha = document.getElementById('alpha-toggle').checked;
  function maybeSort(arr) {
    return alpha ? [...arr].sort((a, b) => a.code.localeCompare(b.code)) : arr;
  }
  const container = document.getElementById('course-container');
  let html = '';

  if (mode === 'chron-asc' || mode === 'chron-desc') {
    const sorted = [...courses].sort((a, b) =>
      mode === 'chron-asc' ? a.semOrder - b.semOrder : b.semOrder - a.semOrder
    );
    const semesters = [...new Set(sorted.map(c => c.semester))];
    semesters.forEach(sem => {
      const cards = maybeSort(sorted.filter(c => c.semester === sem));
      html += sectionHTML(sem, cards, false);
    });
  }

  else if (mode === 'subject') {
    const groups = groupBy(courses, subjectGroup, SUBJECT_ORDER);
    groups.forEach(g => {
      const cards = maybeSort(courses.filter(c => subjectGroup(c) === g));
      html += sectionHTML(g, cards, true);
    });
  }

  else if (mode === 'relevance') {
    const groups = groupBy(courses, relevanceGroup, RELEVANCE_ORDER);
    groups.forEach(g => {
      const cards = maybeSort(courses.filter(c => relevanceGroup(c) === g));
      html += sectionHTML(g, cards, true);
    });
  }

  container.innerHTML = html;
}

// ─── SORT BAR INTERACTION ────────────────────────────────────────────────────
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.mode);
  });
});

document.getElementById('alpha-toggle').addEventListener('change', () => {
  const mode = document.querySelector('.sort-btn.active').dataset.mode;
  render(mode);
});

render('chron-asc');
</script>
</body>
</html>
